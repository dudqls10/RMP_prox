        task_map: identity
        leaf: target
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      control_points:
        parents: [root]
        parent: root
        task_map: control_points
        leaf: none
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      collision:
        parents: [control_points]
        parent: control_points
        task_map: collision_distance
        leaf: collision
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tangent_escape:
        parents: [control_points]
        parent: control_points
        task_map: identity
        leaf: tangent_escape
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      damping:
        parents: [root]
        parent: root
        task_map: identity
        leaf: damping
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      body_link4:
        parents: [root]
        parent: root
        task_map: link_position
        leaf: target
        enabled: false
        target_key: body_goal
        link_name: link4
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_x:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: true
        target_key: orientation_goal_x
        link_name: tcp_rmp
        axis: "x"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_y:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: true
        target_key: orientation_goal_y
        link_name: tcp_rmp
        axis: "y"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_z:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: true
        target_key: orientation_goal_z
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0

    # Robot body guard obstacles
    body_obstacles:
      names:
        - link1_guard_1
        - link1_guard_2
        - link1_guard_3
