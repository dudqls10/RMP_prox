# RB10 RMPflow RViz Parameters

rmpflow_controller:
  ros__parameters:
      # RMP solver common
    root_solve_offset: 0.001

    # Collision RMP
    # lula_canonical preserves the existing production/site formula.
    # Use paper_gds only in the dedicated stability-validation profile first.
    collision_policy: "lula_canonical"
    collision_rmp_margin: 0.0
    # collision_rmp_damping_gain: 100.0
    collision_rmp_damping_gain: 50.0
    collision_rmp_damping_std_dev: 0.01
    collision_rmp_damping_robustness_eps: 0.01
    collision_rmp_damping_velocity_gate_length_scale: 0.03
    # collision_rmp_repulsion_gain: 100.0
    collision_rmp_repulsion_gain: 500.0
    collision_rmp_repulsion_std_dev: 0.05
    collision_rmp_metric_modulation_radius: 0.3
    # collision_rmp_metric_scalar: 0.0
    collision_rmp_metric_scalar: 100000.0
    # collision_rmp_metric_exploder_std_dev: 0.01
    # collision_rmp_metric_exploder_eps: 0.1
    collision_rmp_metric_exploder_std_dev: 0.02
    collision_rmp_metric_exploder_eps: 0.8
    collision_rmp_gds_clearance_smoothing: 0.0001
    collision_rmp_gds_metric_velocity_floor: 0.5
    collision_rmp_gds_metric_velocity_scale: 0.03
    collision_rmp_gds_damping_velocity_scale: 0.03
    # Target RMP

    # vel
    target_rmp_accel_p_gain: 40.0
    target_rmp_accel_d_gain: 120.0

    # Position
    # target_rmp_accel_p_gain: 80.0
    # target_rmp_accel_d_gain: 120.0
    target_rmp_accel_norm_eps: 0.08
    target_rmp_metric_alpha_length_scale: 0.01
    target_rmp_min_metric_alpha: 0.1
    target_rmp_max_metric_scalar: 100000.0
    target_rmp_min_metric_scalar: 25000.0
    target_rmp_proximity_metric_boost_scalar: 2.0
    target_rmp_proximity_metric_boost_length_scale: 0.02

    # Axis Target RMP
    axis_target_rmp_accel_p_gain: 80.0
    axis_target_rmp_accel_d_gain: 80.0
    axis_target_rmp_metric_scalar: 100000.0
    axis_target_rmp_proximity_metric_boost_scalar: 10.0
    axis_target_rmp_proximity_metric_boost_length_scale: 0.01

    # Wrist-only Axis Target RMP
    wrist_axis_target_rmp_accel_p_gain: 100.0
    wrist_axis_target_rmp_accel_d_gain: 50.0
    wrist_axis_target_rmp_metric_scalar: 0.0
    wrist_axis_target_rmp_proximity_metric_boost_scalar: 1.0
    wrist_axis_target_rmp_proximity_metric_boost_length_scale: 0.01

    # Damping RMP
    # vel
    damping_rmp_accel_d_gain: 120.0
    damping_rmp_metric_scalar: 0.0

    # Position
    # damping_rmp_accel_d_gain: 80.0
    # damping_rmp_metric_scalar: 100.0

    damping_rmp_inertia: 300.0

    # C-space Target RMP
    cspace_target_metric_scalar: 1000.0
    cspace_target_position_gain: 5.0
    cspace_target_damping_gain: 30.0
    cspace_target_robust_position_term_thresh: 0.5
    cspace_target_inertia: 0.0

    # Joint Limit RMP
    joint_limit_policy: "lula_canonical"
    joint_limit_metric_scalar: 1000.0
    joint_limit_metric_length_scale: 0.1
    joint_limit_metric_exploder_eps: 0.001
    joint_limit_metric_velocity_gate_length_scale: 0.01
    joint_limit_accel_damper_gain: 100.0
    joint_limit_accel_potential_gain: 100.0
    joint_limit_accel_potential_exploder_eps: 0.001
    joint_limit_accel_potential_exploder_length_scale: 0.01
    joint_limit_gds_center_fraction: 0.5
    joint_limit_gds_domain_epsilon: 0.000000001

    # Joint Velocity Cap RMP
    joint_velocity_cap_max_velocity: 1.0
    joint_velocity_cap_velocity_damping_region: 0.5
    joint_velocity_cap_damping_gain: 500.0
    joint_velocity_cap_metric_weight: 100.0

    # Command limits
    max_joint_accel: 10.0
    preserve_joint_accel_direction: true
    # max_joint_accel: 1.5
    command_guard_max_velocity_rad_s: 1.0
    # command_guard_max_velocity_rad_s: 0.5
    predictive_joint_limit_guard: true



    control_rate: 200.0
    estimate_velocity_in_controller: false
    controller_velocity_filter_alpha: 0.5
    use_synced_input_velocity_filter: false
    synced_input_velocity_filter_type: "alpha-beta"
    synced_input_velocity_filter_alpha: 0.7
    synced_input_velocity_filter_beta: 0.04
    synced_input_velocity_ratio_tolerance: 0.05
    use_velocity_feedback_in_solver: true
    measured_position_feedback_blend: 1.0
    measured_velocity_feedback_blend: 0.6
    visualization_rate: 20.0
    publish_visualization: true
    publish_goal_marker: true
    publish_control_point_markers: false
    publish_body_obstacle_markers: false
    publish_end_effector_pose: false
    publish_debug_state: false
    # RViz-only marker diameter. This does not change the collision radius.
    control_point_marker_diameter: 0.10
    publish_repulsion_metric_markers: false
    repulsion_metric_marker_min_norm: 0.01
    repulsion_metric_marker_dot_diameter: 0.04

    # TCP acceleration visualization
    publish_tcp_accel_marker: true
    tcp_accel_marker_topic: "tcp_accel_marker"
    tcp_accel_marker_max_length: 0.15
    tcp_accel_marker_norm_for_max_length: 2.0
    tcp_accel_marker_min_norm: 0.001

    # Score-supervised rank-one tangent canonical RMP.
    # risk_damped is the active design.  canonical_velocity remains compiled
    # only for controlled A/B rollback and is not selected by this profile.
    enable_tangent_escape_rmp: false
    tangent_escape_rmp_acceleration_model: "risk_damped"
    # Independent numeric values. The Escape metric is intentionally lower
    # than Collision's 100000.0 after the visual tuning run. The clearance
    # margin remains the same numeric 0.0 m, but neither value is linked to
    # Collision parameters at runtime.
    tangent_escape_rmp_metric_scalar: 50000.0
    tangent_escape_rmp_clearance_margin: 0.0
    # In risk_damped mode its effective rank-one metric is m_t * lambda * B.
    # canonical_velocity-only compatibility gain (unused by risk_damped).
    tangent_escape_rmp_velocity_gain: 20.0
    # This is a Cartesian tangent-task limit (m/s^2). The resolved joint
    # acceleration still follows the independent global max_joint_accel limit.
    tangent_escape_rmp_max_accel: 0.6
    tangent_escape_rmp_goal_block_beta_on: 0.5
    tangent_escape_rmp_goal_block_beta_full: 0.94
    tangent_escape_rmp_nominal_prediction_dt: 0.01
    tangent_escape_rmp_normal_tolerance: 0.20

    # Active risk-damped acceleration:
    #   a_risk = k_p exp(-d+/sigma_p)
    #          + g_v(dot_d) k_v max(0,-dot_d)/(d+/sigma_v+eps)
    #   a_y = sat(a_risk - b_t v_t),  m_y = m_t lambda B.
    # Only the clearance derivative is filtered; B is never filtered.
    tangent_escape_rmp_risk_distance_gain: 0.30
    tangent_escape_rmp_risk_distance_scale: 0.08
    tangent_escape_rmp_risk_approach_gain: 0.50
    tangent_escape_rmp_risk_approach_distance_scale: 0.08
    tangent_escape_rmp_risk_approach_epsilon: 0.25
    tangent_escape_rmp_risk_velocity_gate_scale: 0.03
    tangent_escape_rmp_risk_clearance_rate_filter_time_constant: 0.05
    tangent_escape_rmp_risk_tangent_damping_gain: 10.0

    # Compatibility/shared supervisor block. risk_damped ignores the old z-LPF,
    # desired-velocity, drive-ramp, and RELEASE parameters, while it still uses
    # intent, scoring, latch/handoff, max_speed, and failure-monitor settings.
    # The ignored values remain parsed only so canonical_velocity can be used
    # for an explicit rollback/A-B run; it is not selected by this profile.
    tangent_escape_rmp_prevent_weight: 0.5
    tangent_escape_rmp_activation_time_constant: 0.15
    tangent_escape_rmp_activation_rise_rate: 4.0
    tangent_escape_rmp_activation_fall_rate: 2.0
    tangent_escape_rmp_progress_filter_time_constant: 0.25
    tangent_escape_rmp_progress_low_threshold: 0.001
    tangent_escape_rmp_progress_ok_threshold: 0.02
    tangent_escape_rmp_still_speed_threshold: 0.01
    tangent_escape_rmp_moving_speed_threshold: 0.08
    # Ignore nominal directions below intent_on_speed. Between on/full,
    # smoothly raise the confidence that the base RMP intends to move this CP.
    tangent_escape_rmp_intent_on_speed: 0.005
    tangent_escape_rmp_intent_full_speed: 0.03
    tangent_escape_rmp_prevent_speed: 0.018
    tangent_escape_rmp_recovery_speed: 0.05
    tangent_escape_rmp_max_speed: 0.05
    tangent_escape_rmp_desired_velocity_time_constant: 0.22
    tangent_escape_rmp_release_stop_speed: 0.01
    tangent_escape_rmp_release_hold_speed: 0.06
    tangent_escape_rmp_drive_ramp_duration: 0.25
    tangent_escape_rmp_handoff_duration: 0.25
    tangent_escape_rmp_minimum_drive_duration: 0.8
    tangent_escape_rmp_release_blockage_threshold: 0.03
    tangent_escape_rmp_pair_switch_margin: 0.10
    tangent_escape_rmp_direction_switch_margin: 0.08
    tangent_escape_rmp_goal_score_scale: 0.02
    tangent_escape_rmp_sector_risk_scale: 1.0
    tangent_escape_rmp_sector_risk_hard_limit: 0.98
    tangent_escape_rmp_sector_risk_change_threshold: 0.10
    tangent_escape_rmp_accel_jump_weight: 0.20
    tangent_escape_rmp_accel_jump_scale: 10.0
    tangent_escape_rmp_blocked_memory_sigma: 0.35
    tangent_escape_rmp_blocked_memory_penalty_weight: 2.0
    tangent_escape_rmp_candidate_min_displacement: 0.00001
    tangent_escape_rmp_refinement_iterations: 5
    tangent_escape_rmp_command_test_distance: 0.002
    tangent_escape_rmp_minimum_move_ratio: 0.30
    tangent_escape_rmp_goal_change_reset_distance: 0.02

    publish_tangent_escape_rmp_data: false
    tangent_escape_rmp_data_topic: "/tangent_escape_rmp_data"
    publish_tangent_escape_dual_solve_data: false
    tangent_escape_dual_solve_topic: "/tangent_escape_dual_solve"
    publish_leaf_ablation_data: false
    leaf_ablation_topic: "/rmp_leaf_ablation"

    # Tangent escape activation and candidate selection.
    tangent_escape_rmp_safe_distance: 0.08
    tangent_escape_rmp_influence_distance: 0.24
    tangent_escape_rmp_candidate_lookahead: 0.08
    tangent_escape_rmp_goal_weight: 2.0
    tangent_escape_rmp_continuity_weight: 0.3
    tangent_escape_rmp_sector_risk_weight: 1.5
    tangent_escape_rmp_min_activation: 0.05
    tangent_escape_rmp_min_tangent_norm: 0.0001

    # Escape/base stability certificate. Disabled in the normal production
    # profile; the dedicated proof launch enables the finite-energy guard.
    escape_stability_guard_enabled: false
    # The tank always starts full, so this is both capacity and initial energy.
    # Placeholder only. During gain calibration, override this with a large
    # simulation-only budget so scale remains 1; after successful Escape runs,
    # replace it with the measured mission requirement plus a validated margin.
    escape_stability_tank_capacity: 0.25
    escape_stability_scale_search_iterations: 16
    escape_stability_power_tolerance: 0.000000001
    publish_stability_certificate_data: false
    stability_certificate_data_topic: "/rmp_stability_certificate"

    publish_tangent_escape_geometry_debug: false
    tangent_escape_geometry_data_topic: "/tangent_escape_geometry_data"
    tangent_escape_geometry_marker_topic: "tangent_escape_geometry_markers"
    tangent_escape_geometry_marker_length: 0.12
    goal_x: 0.6
    goal_y: -0.4
    goal_z: 0.6
    min_goal_z: 0.05
    initialize_goal_from_first_state: true
    safety_stop_on_min_z: false
    workspace_floor_z: 0.0
    min_link6_z: 0.03
    min_tcp_z: 0.05
    initial_q: [0.624269511868643, -0.42053732097686486, -1.6277205440557674, 0.749218624408137, -1.429386695978297, 0.5760347969017805]
    default_q: [0.624269511868643, -0.42053732097686486, -1.6277205440557674, 0.749218624408137, -1.429386695978297, 0.5760347969017805]
    joint_lower_limits_deg: [-211.68, -70.0, -150.0, -80.0, -180.0, -360.0]
    joint_upper_limits_deg: [211.68, 70.0, -50.0, 80.0, 120.0, 360.0]
    joint_limit_buffers: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
    backend_mode: "simulation"
    hardware_state_topic: "hardware_joint_states"
    hardware_command_topic: "hardware_joint_command"
    joint_state_topic: "joint_states"
    position_command_topic: "position_controllers/commands"
    publish_position_command: true
    position_command_state_topic: "/rmp_position_command"
    publish_rmp_accel_debug: true
    rmp_joint_accel_topic: "/rmp_joint_accel"
    rmp_tcp_accel_topic: "/rmp_tcp_accel"
    # position: move_servo_j(q), velocity: move_speed_j(qd)
    # command_mode: "position"
    command_mode: "velocity"
    # SpeedJ parameters used only when command_mode is velocity.
    speedj_t1: 0.02
    speedj_t2: 0.2
    speedj_gain: 0.05
    speedj_alpha: 0.1
    publish_joint_states: true
    joint_state_publish_topic: "joint_states"
    publish_goal_tf: false
    goal_tf_parent_frame: "base_link"
    goal_tf_child_frame: "rmp_goal_target"
    enable_realtime: false
    realtime_priority: 80
    lock_memory: false
    body_goal: [0.45, 0.0, 0.9]
    orientation_goal: [0.0, 0.0, 1.0]
    solve_method: "rmp2"
    rmp_type: "canonical"
    # RMP graph topology
    graph:
      node_names:
        - cspace_target
        - joint_limits
        - joint_velocity_cap
        - tcp_position
        - target
        - control_points
        - collision
        - tangent_escape
        - damping
        - body_link4
        - tcp_axis_target_x
        - tcp_axis_target_y
        - tcp_axis_target_z
      cspace_target:
        parents: [root]
        parent: root
        task_map: cspace_target
        leaf: cspace_target
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      joint_limits:
        parents: [root]
        parent: root
        task_map: joint_limit
        leaf: joint_limit
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      joint_velocity_cap:
        parents: [root]
        parent: root
        task_map: identity
        leaf: joint_velocity_cap
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_position:
