interactive_goal:
  ros__parameters:
    initial_x: 0.6
    initial_y: -0.4
    initial_z: 0.6
    initial_q: [1.0660471071181365, -0.3311238656883642, -1.7919295430225781, 0.8574628082122941, -1.557060585581701, 0.15151203236562774]
    initialize_from_joint_state: true
    joint_state_topic: "joint_states"

obstacle_manager:
  ros__parameters:
    num_obstacles: 1
    default_radius: 0.06
    default_height: 0.8
    default_positions: [-0.015865802764892578, -0.414907306432724, 0.4573509991168976]

proximity_obstacle_bridge:
  ros__parameters:
    fixed_frame: "base_link"
    obstacle_topic: "obstacles"
    visualization_obstacle_topic: "obstacle_markers"
    publish_rate: 100.0
    visualization_publish_rate: 20.0
    publish_collision_obstacles: true
    obstacle_radius: 0.08
    # Create measured local surface patches from valid ToF hit points.
    surface_patch_enabled: true
    surface_patch_rows: 5
    surface_patch_cols: 5
    surface_patch_spacing: 0.03
    surface_patch_sphere_radius: 0.03
    surface_patch_marker_lifetime: 0.25
    # RViz-only memory of measured surface hit points. This is not fed back as collision input.
    # Surface hit point center: p_sensor + R_sensor * +X * range.
    surface_patch_fixed_visualization: true
    surface_patch_visualization_topic: "proximity_surface_patches"
    surface_patch_memory_distance: 0.025
    surface_patch_memory_max_markers: 1200
    # Also feed the remembered sensor surface hits into /obstacles for collision RMP input.
    surface_patch_collision_memory_enabled: true
    valid_margin: 0.001
    range_scale: 0.001
    minimum_hold_distance: 0.05
    trigger_distance: 0.15
    enable_proximity_distance_1_4: true
    joint_state_topic: "joint_states"
    elbow_tof3_1_w_ignore_enabled: true
    elbow_tof3_1_w_ignore_min_deg: -150.0
    elbow_tof3_1_w_ignore_max_deg: -130.0
    elbow_tof3_1_w_ignore_state_timeout: 0.5
    elbow_tof3_1_w_ignore_clear_memory: true
    sensor_enabled:
      - true   # proximity_distance1 -> tof6_1_L
      - true   # proximity_distance2 -> tof6_1_F
      - true   # proximity_distance3 -> tof6_1_R
      - true   # proximity_distance4 -> tof6_1_U
      - true  # proximity_distance6 -> tof_S
      - true   # proximity_distance7 -> tof_E
      - true   # proximity_distance8 -> tof_N
      - true   # proximity_distance5 -> tof_W
      - false   # proximity_distance12 -> tof3_1_S
      - true   # proximity_distance9 -> tof3_1_W
      - false   # proximity_distance10 -> tof3_1_N
      - true  # proximity_distance11 -> tof3_1_E
      - true  # proximity_distance13 -> tof2_N
      - true  # proximity_distance14 -> tof2_W
      - true  # proximity_distance15 -> tof2_S
      - true  # proximity_distance16 -> tof2_E
      - false # proximity_distance17 -> tof2_E
      - false  # proximity_distance18 -> tof2_S
      - false   # proximity_distance19 -> tof2_W
      - false  # proximity_distance20 -> tof2_N
    trigger_distances:
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
      - 0.15
