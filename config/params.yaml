        leaf: damping
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      body_link4:
        parents: [root]
        parent: root
        task_map: link_position
        leaf: target
        enabled: false
        target_key: body_goal
        link_name: link4
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_x:
        parents: [root]
        parent: root
