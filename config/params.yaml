# RB10 RMPflow RViz Parameters

rmpflow_controller:
  ros__parameters:
      # RMP solver common
    root_solve_offset: 0.001

    # Collision RMP
    collision_policy: "repulsive"
    collision_rmp_margin: 0.0
    # collision_rmp_damping_gain: 100.0
    collision_rmp_damping_gain: 50.0
    collision_rmp_damping_std_dev: 0.01
    collision_rmp_damping_robustness_eps: 0.01
    collision_rmp_damping_velocity_gate_length_scale: 0.03
    # collision_rmp_repulsion_gain: 100.0
    collision_rmp_repulsion_gain: 500.0
    collision_rmp_repulsion_std_dev: 0.05
    collision_rmp_metric_modulation_radius: 0.30
    # collision_rmp_metric_scalar: 0.0
    collision_rmp_metric_scalar: 100000.0
    # collision_rmp_metric_exploder_std_dev: 0.01
    # collision_rmp_metric_exploder_eps: 0.1
    collision_rmp_metric_exploder_std_dev: 0.02
    collision_rmp_metric_exploder_eps: 0.8
    # Target RMP

    # vel
    target_rmp_accel_p_gain: 40.0
    target_rmp_accel_d_gain: 120.0

    # Position
    # target_rmp_accel_p_gain: 80.0
    # target_rmp_accel_d_gain: 120.0
    target_rmp_accel_norm_eps: 0.08
    target_rmp_metric_alpha_length_scale: 0.01
    target_rmp_min_metric_alpha: 0.1
    target_rmp_max_metric_scalar: 100000.0
    target_rmp_min_metric_scalar: 25000.0
    target_rmp_proximity_metric_boost_scalar: 2.0
    target_rmp_proximity_metric_boost_length_scale: 0.02

    # Axis Target RMP
    axis_target_rmp_accel_p_gain: 80.0
    axis_target_rmp_accel_d_gain: 80.0
    axis_target_rmp_metric_scalar: 100000.0
    axis_target_rmp_proximity_metric_boost_scalar: 10.0
    axis_target_rmp_proximity_metric_boost_length_scale: 0.01

    # Wrist-only Axis Target RMP
    wrist_axis_target_rmp_accel_p_gain: 100.0
    wrist_axis_target_rmp_accel_d_gain: 50.0
    wrist_axis_target_rmp_metric_scalar: 0.0
    wrist_axis_target_rmp_proximity_metric_boost_scalar: 1.0
    wrist_axis_target_rmp_proximity_metric_boost_length_scale: 0.01

    # Damping RMP
    # vel
    damping_rmp_accel_d_gain: 160.0
    damping_rmp_metric_scalar: 500.0

    # Position
    # damping_rmp_accel_d_gain: 80.0
    # damping_rmp_metric_scalar: 100.0

    damping_rmp_inertia: 300.0

    # C-space Target RMP
    cspace_target_metric_scalar: 1000.0
    cspace_target_position_gain: 5.0
    cspace_target_damping_gain: 30.0
    cspace_target_robust_position_term_thresh: 0.5
    cspace_target_inertia: 0.0

    # Joint Limit RMP
    joint_limit_metric_scalar: 1000.0
    joint_limit_metric_length_scale: 0.1
    joint_limit_metric_exploder_eps: 0.001
    joint_limit_metric_velocity_gate_length_scale: 0.01
    joint_limit_accel_damper_gain: 100.0
    joint_limit_accel_potential_gain: 100.0
    joint_limit_accel_potential_exploder_eps: 0.001
    joint_limit_accel_potential_exploder_length_scale: 0.01

    # Joint Velocity Cap RMP
    joint_velocity_cap_max_velocity: 1.0
    joint_velocity_cap_velocity_damping_region: 0.5
    joint_velocity_cap_damping_gain: 500.0
    joint_velocity_cap_metric_weight: 100.0

    # Command limits
    max_joint_accel: 10.0
    # max_joint_accel: 1.5
    command_guard_max_velocity_rad_s: 1.0
    # command_guard_max_velocity_rad_s: 0.5
    predictive_joint_limit_guard: true



    control_rate: 200.0
    estimate_velocity_in_controller: false
    controller_velocity_filter_alpha: 0.5
    use_synced_input_velocity_filter: false
    synced_input_velocity_filter_type: "alpha-beta"
    synced_input_velocity_filter_alpha: 0.7
    synced_input_velocity_filter_beta: 0.04
    synced_input_velocity_ratio_tolerance: 0.05
    use_velocity_feedback_in_solver: true
    measured_position_feedback_blend: 1.0
    measured_velocity_feedback_blend: 0.6
    visualization_rate: 20.0
    publish_visualization: true
    publish_goal_marker: true
    publish_control_point_markers: false
    publish_body_obstacle_markers: false
    publish_end_effector_pose: false
    publish_debug_state: false
    # RViz-only marker diameter. This does not change the collision radius.
    control_point_marker_diameter: 0.10
    publish_repulsion_metric_markers: false
    repulsion_metric_marker_min_norm: 0.01
    repulsion_metric_marker_dot_diameter: 0.04
    publish_tcp_accel_marker: true
    tcp_accel_marker_topic: "tcp_accel_marker"
    tcp_accel_marker_max_length: 0.15
    tcp_accel_marker_norm_for_max_length: 2.0
    tcp_accel_marker_min_norm: 0.001
    enable_tangent_escape_filter: false
    enable_tangent_escape_rmp: false
    tangent_escape_rmp_metric_scalar: 0.0
    tangent_escape_rmp_normal_metric_scalar: 0.0
    tangent_escape_rmp_damping_gain: 0.0
    tangent_escape_rmp_escape_speed: 0.05
    tangent_escape_rmp_velocity_gain: 5.0
    tangent_escape_rmp_max_accel: 0.8
    tangent_escape_rmp_goal_block_beta_on: 0.5
    tangent_escape_rmp_goal_block_beta_full: 0.94
    tangent_escape_filter_safe_distance: 0.08
    tangent_escape_filter_influence_distance: 0.20
    tangent_escape_filter_tangent_gain: 30.0
    tangent_escape_filter_normal_gain: 0.0
    tangent_escape_filter_damping: 0.02
    tangent_escape_filter_max_delta_qdd: 15.0
    tangent_escape_filter_candidate_count: 16
    tangent_escape_filter_candidate_lookahead: 0.08
    tangent_escape_filter_goal_weight: 1.0
    tangent_escape_filter_continuity_weight: 0.5
    tangent_escape_filter_up_weight: 0.0
    tangent_escape_filter_duplicate_risk_weight: 2.0
    tangent_escape_filter_adjacent_block_weight: 1.0
    tangent_escape_filter_branch_hold_weight: 0.5
    tangent_escape_filter_min_activation: 0.05
    tangent_escape_filter_min_tangent_norm: 0.0001
    tangent_escape_filter_goal_normal_dot_threshold: 1.0
    publish_tangent_escape_filter_debug: false
    tangent_escape_filter_marker_topic: "tangent_escape_filter_markers"
    tangent_escape_filter_marker_length: 0.12
    publish_tangent_escape_filter_data: true
    tangent_escape_filter_data_topic: "/tangent_escape_filter_data"
    publish_tangent_escape_filter_candidate_data: true
    tangent_escape_filter_candidate_data_topic: "/tangent_escape_filter_candidates"
    goal_x: 0.6
    goal_y: -0.4
    goal_z: 0.6
    min_goal_z: 0.05
    initialize_goal_from_first_state: true
    safety_stop_on_min_z: false
    workspace_floor_z: 0.0
    min_link6_z: 0.03
    min_tcp_z: 0.05
    initial_q: [1.0660471071181365, -0.3311238656883642, -1.7919295430225781, 0.8574628082122941, -1.557060585581701, 0.15151203236562774]
    default_q: [1.0660471071181365, -0.3311238656883642, -1.7919295430225781, 0.8574628082122941, -1.557060585581701, 0.15151203236562774]
    joint_lower_limits_deg: [-211.68, -70.0, -150.0, -80.0, -180.0, -360.0]
    joint_upper_limits_deg: [211.68, 70.0, -50.0, 80.0, 120.0, 360.0]
    joint_limit_buffers: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
    backend_mode: "simulation"
    hardware_state_topic: "hardware_joint_states"
    hardware_command_topic: "hardware_joint_command"
    joint_state_topic: "joint_states"
    position_command_topic: "position_controllers/commands"
    publish_position_command: true
    position_command_state_topic: "/rmp_position_command"
    publish_rmp_accel_debug: true
    rmp_joint_accel_topic: "/rmp_joint_accel"
    rmp_tcp_accel_topic: "/rmp_tcp_accel"
    # position: move_servo_j(q), velocity: move_speed_j(qd)
    # command_mode: "position"
    command_mode: "velocity"
    # SpeedJ parameters used only when command_mode is velocity.
    speedj_t1: 0.02
    speedj_t2: 0.2
    speedj_gain: 0.05
    speedj_alpha: 0.1
    publish_joint_states: true
    joint_state_publish_topic: "joint_states"
    publish_goal_tf: false
    goal_tf_parent_frame: "base_link"
    goal_tf_child_frame: "rmp_goal_target"
    enable_realtime: false
    realtime_priority: 80
    lock_memory: false
    body_goal: [0.45, 0.0, 0.9]
    orientation_goal: [0.0, 0.0, 1.0]
    solve_method: "rmp2"
    rmp_type: "canonical"
    # RMP graph topology
    graph:
      node_names:
        - cspace_target
        - joint_limits
        - joint_velocity_cap
        - tcp_position
        - target
        - control_points
        - collision
        - tangent_escape
